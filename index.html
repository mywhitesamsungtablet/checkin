  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, "Segoe UI", "Sarabun", Tahoma, sans-serif;
      margin: 0; padding: 0;
      background: linear-gradient(160deg, #0b6b5f 0%, #0e8a78 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      color: #1a1a1a;
    }
    .card {
      background: #fff; width: 100%; max-width: 420px;
      margin: 16px; padding: 28px 24px 30px;
      border-radius: 18px; box-shadow: 0 12px 40px rgba(0,0,0,.25);
    }
    h1 { font-size: 22px; margin: 0 0 4px; color: #0b6b5f; text-align: center; }
    .note { font-size: 14px; color: #666; text-align: center; margin: 0 0 20px; }
    label { display: block; font-size: 13px; font-weight: 600; margin: 4px 0 6px; color: #444; }
    input {
      width: 100%; font-size: 17px; padding: 12px 14px;
      border: 1.5px solid #cfd8d5; border-radius: 11px; outline: none;
      -webkit-appearance: none;
    }
    input:focus { border-color: #0e8a78; box-shadow: 0 0 0 3px rgba(14,138,120,.15); }
    .editlink { color: #0e8a78; font-weight: 600; font-size: 12px; margin-left: 8px; cursor: pointer; }

    /* ---- secondary button (Add app icon) ---- */
    button {
      width: 100%; margin-top: 16px; padding: 14px;
      font-size: 16px; font-weight: 700; color: #fff;
      background: #0e8a78; border: 0; border-radius: 12px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ---- main SEND button: 2x size, raised 3D, presses down on tap ---- */
    #sendBtn {
      position: relative;
      display: flex; align-items: center; justify-content: center; text-align: center;
      width: 250px; height: 250px; max-width: 84%;
      margin: 30px auto 10px; padding: 0;
      font-size: 36px; font-weight: 800; letter-spacing: 3px;
      background: linear-gradient(180deg, #14a891 0%, #0e8a78 100%);
      border-radius: 30px;
      box-shadow: 0 13px 0 #095046, 0 24px 36px rgba(0,0,0,.32);
      transition: transform .06s ease, box-shadow .06s ease;
    }
    #sendBtn:active:not(:disabled) {
      transform: translateY(10px);
      box-shadow: 0 3px 0 #095046, 0 8px 16px rgba(0,0,0,.26);
    }
    #sendBtn:disabled {
      background: #9bbdb6; box-shadow: 0 7px 0 #7fa69e; cursor: default;
    }
    /* ---- working state: pressed-down; "SENDING" centered + slow blink; params flash one-by-one ---- */
    #sendBtn.sending {
      padding: 0; cursor: default;
      background: linear-gradient(180deg, #14a891 0%, #0e8a78 100%);
      transform: translateY(10px);
      box-shadow: 0 3px 0 #095046, 0 8px 16px rgba(0,0,0,.26);
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: .35; } }
    @keyframes paramBlink { 0%, 100% { opacity: 1; } 50% { opacity: .2; } }
    #sendBtn .s-title {
      position: absolute; top: 50%; left: 0; right: 0; transform: translateY(-50%);
      text-align: center; font-size: 30px; font-weight: 800; letter-spacing: 1px;
      text-transform: uppercase;
      animation: blink 1.6s ease-in-out infinite;
    }
    #sendBtn .s-params {
      position: absolute; left: 10px; right: 10px; bottom: 26px;
      text-align: center; font-size: 12px; font-weight: 500; line-height: 1.4;
      letter-spacing: .2px; color: rgba(255,255,255,.65); word-break: break-word;
      min-height: 16px;
      animation: paramBlink .8s ease-in-out infinite;
    }

    .err { color: #d33; font-size: 13px; margin-top: 12px; min-height: 16px; text-align: center; }
    .status { font-size: 13px; color: #0b6b5f; text-align: center; margin-top: 12px; min-height: 16px; }
    .done { text-align: center; padding: 16px 0; }
    .done .check {
      width: 72px; height: 72px; border-radius: 50%;
      background: #0e8a78; color: #fff; font-size: 42px; line-height: 72px; margin: 0 auto 14px;
    }
    .done h2 { color: #0b6b5f; margin: 0 0 6px; }
    .done p { color: #666; margin: 0; font-size: 14px; }
    .summary { text-align: left; font-size: 13px; color: #555; margin-top: 14px;
               background: #f4f6f5; border-radius: 10px; padding: 12px 14px; }
    .summary div { margin: 3px 0; word-break: break-all; }
    .a2hs { margin-top: 14px; }
    .a2hs-hint { font-size: 13px; color: #555; margin-top: 10px; line-height: 1.5;
                 background: #f4f6f5; border-radius: 8px; padding: 10px 12px; text-align: center; }
    .hidden { display: none; }
    .credit {
      position: fixed; right: 7px; bottom: 5px;
      font-size: 9px; letter-spacing: .3px; line-height: 1;
      color: rgba(255,255,255,.28); pointer-events: none; user-select: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- main view -->
    <div id="mainView">
      <h1>Time Stamp</h1>
      <p class="note">Tap the button below to send your info (your location will be requested).</p>

      <div id="phoneRow">
        <label for="phone">Mobile number <span class="editlink hidden" id="phoneEdit" onclick="unlockPhone()">Change</span></label>
        <input id="phone" type="tel" inputmode="numeric" autocomplete="tel"
               name="phone" placeholder="08X-XXX-XXXX" maxlength="15">
      </div>

      <button id="sendBtn" onclick="startSend()">SEND</button>
      <div class="status" id="status"></div>
      <div class="err" id="err"></div>
    </div>

    <!-- thank-you view -->
    <div id="doneView" class="done hidden">
      <div class="check">&#10003;</div>
      <h2>Sent successfully</h2>
      <p>Thank you.</p>
      <div class="summary" id="summary"></div>
      <div class="a2hs hidden" id="a2hs"></div>
    </div>
  </div>
  <div class="credit" id="credit">KOSIE · v4.3 · 2026-07-19</div>

    // ============================================================

                    tz: '', lang: '', cpu: '', ram: '',    // แยกคอลัมน์
                    version: APP_VERSION,                  // เวอร์ชันซอฟต์แวร์ที่เครื่องนี้กำลังรัน
                    tzlang: '', cpuram: '' };              // รวม (เผื่อ backend เก่า)

    // sync เครดิตมุมล่างให้ตรงกับ APP_VERSION เสมอ (แก้เวอร์ชันที่เดียว)
    (function () { var c = document.getElementById('credit'); if (c) c.textContent = 'KOSIE · ' + APP_VERSION + ' · 2026-07-18'; })(); // headers=EN v4.1

    var deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', function (e) { e.preventDefault(); deferredPrompt = e; });

    (function collectDevice() {
      var ua = navigator.userAgent || '';
      var os = 'Unknown';
      if (/Android/i.test(ua)) os = 'Android';
      else if (/iPhone|iPad|iPod/i.test(ua)) os = 'iOS';
      else if (/Windows/i.test(ua)) os = 'Windows';
      else if (/Mac OS X/i.test(ua)) os = 'macOS';
      else if (/Linux/i.test(ua)) os = 'Linux';

      var model = '';
      var m = ua.match(/;\s?([^;]+?)\s+Build\//);
      if (m) model = m[1].trim();
      else if (/iPhone/i.test(ua)) model = 'iPhone';
      else if (/iPad/i.test(ua)) model = 'iPad';

      var br = 'Unknown';
      if (/Edg/i.test(ua)) br = 'Edge';
      else if (/OPR|Opera/i.test(ua)) br = 'Opera';
      else if (/Line/i.test(ua)) br = 'LINE';
      else if (/CriOS|Chrome/i.test(ua)) br = 'Chrome';
      else if (/FxiOS|Firefox/i.test(ua)) br = 'Firefox';
      else if (/Safari/i.test(ua)) br = 'Safari';

      payload.os      = os;
      payload.model   = model;
      payload.device  = os + (model ? ' · ' + model : '');   // combined too (backward-compat with old backend)
      payload.browser = br;
      payload.deviceId = deviceIdQuickSync();                // sync best-guess (localStorage/cookie)
    })();

    // resolve the most stable id across localStorage + cookie + IndexedDB (recovers if one store was cleared)
    resolveDeviceId(payload.deviceId).then(function (id) { payload.deviceId = id; });

    // Phone: from URL (?p=) first, else from localStorage.
    // If a saved number exists (2nd+ use) → hide the phone field entirely, keep only the button.
    (function initPhone() {
      var el = document.getElementById('phone');
      var qp = new URLSearchParams(location.search);
      var saved = (qp.get('p') || '').replace(/[^0-9]/g, '').slice(0, 15);
      if (!saved) { try { saved = localStorage.getItem('__qr_phone__') || ''; } catch (e) {} }
      if (saved) { el.value = saved; hidePhoneRow(); }
    })();

    function hidePhoneRow() {
      var row = document.getElementById('phoneRow');
      if (row) row.classList.add('hidden');   // number stays in the field and still submits, just not shown
    }
    function unlockPhone() {
      var el = document.getElementById('phone');
      el.readOnly = false; el.value = ''; el.focus();
      var lk = document.getElementById('phoneEdit'); if (lk) lk.classList.add('hidden');
    }

    // ---- Stable device id: mirrored in localStorage + cookie + IndexedDB.
    //      Any surviving store restores the others → survives clearing one storage type,
    //      much harder to lose than a single localStorage value. (Still a web pseudo-id, NOT IMEI/IDFV.)
    var DEVID_KEY = '__qr_device_id__';   // keep old key so existing ids carry over

    function newId() {
      return (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
             : (Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 12));
    }
    function lsGet(k) { try { return localStorage.getItem(k) || ''; } catch (e) { return ''; } }
    function lsSet(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }
    function ckGet(k) { var m = document.cookie.match('(?:^|; )' + k + '=([^;]*)'); return m ? decodeURIComponent(m[1]) : ''; }
    function ckSet(k, v) { try { document.cookie = k + '=' + encodeURIComponent(v) + '; max-age=34560000; path=/; SameSite=Lax'; } catch (e) {} }
    function idbOpen() {
      return new Promise(function (res, rej) {
        try {
          var r = indexedDB.open('checkin_db', 1);
          r.onupgradeneeded = function () { try { r.result.createObjectStore('kv'); } catch (e) {} };
          r.onsuccess = function () { res(r.result); };
          r.onerror = function () { rej(); };
        } catch (e) { rej(); }
      });
    }
    function idbGet(k) {
      return new Promise(function (res) {
        idbOpen().then(function (db) {
          try { var g = db.transaction('kv', 'readonly').objectStore('kv').get(k);
                g.onsuccess = function () { res(g.result || ''); }; g.onerror = function () { res(''); }; }
          catch (e) { res(''); }
        }, function () { res(''); });
      });
    }
    function idbSet(k, v) { idbOpen().then(function (db) { try { db.transaction('kv', 'readwrite').objectStore('kv').put(v, k); } catch (e) {} }, function () {}); }

    // sync best-guess right away (from localStorage/cookie); generates a new one only if truly none
    function deviceIdQuickSync() {
      var id = lsGet(DEVID_KEY) || ckGet(DEVID_KEY);
      if (!id) id = newId();
      lsSet(DEVID_KEY, id); ckSet(DEVID_KEY, id);
      return id;
    }
    // async: also check IndexedDB; if it holds an older surviving id, recover it; then re-sync all three
    function resolveDeviceId(currentId) {
      return new Promise(function (resolve) {
        idbGet(DEVID_KEY).then(function (idb) {
          var id = (idb && idb !== currentId) ? idb : currentId;   // prefer an existing id from any store
          lsSet(DEVID_KEY, id); ckSet(DEVID_KEY, id); idbSet(DEVID_KEY, id);
          resolve(id);
        });
      });
    }

    // ---- Device fingerprint: corroborating "same device" signals, computed once at page load ----
    //      (web pseudo-signals; helps confirm same device but NOT unique — same phone model looks alike)
    function fpHash(s) {
      var h = 0x811c9dc5;
      for (var i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 0x01000193); }
      return ('0000000' + (h >>> 0).toString(16)).slice(-8);
    }
    function fpWebGL() {
      try {
        var c = document.createElement('canvas');
        var gl = c.getContext('webgl') || c.getContext('experimental-webgl');
        if (!gl) return '';
        var ext = gl.getExtension('WEBGL_debug_renderer_info');
        return String((ext ? gl.getParameter(ext.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER)) || '');
      } catch (e) { return ''; }
    }
    function fpCanvas() {
      try {
        var c = document.createElement('canvas'); c.width = 250; c.height = 60;
        var x = c.getContext('2d');
        x.textBaseline = 'top'; x.font = '16px Arial';
        x.fillStyle = '#f60'; x.fillRect(0, 0, 120, 20);
        x.fillStyle = '#069'; x.fillText('Check-in 🔒 fp', 4, 22);
        x.strokeStyle = 'rgba(100,180,80,.6)'; x.beginPath(); x.arc(180, 30, 18, 0, Math.PI * 2); x.stroke();
        return fpHash(c.toDataURL());
      } catch (e) { return ''; }
    }
    function fpAudio() {
      return new Promise(function (res) {
        try {
          var Ctx = window.OfflineAudioContext || window.webkitOfflineAudioContext;
          if (!Ctx) { res(''); return; }
          var ctx = new Ctx(1, 5000, 44100);
          var osc = ctx.createOscillator(); osc.type = 'triangle'; osc.frequency.value = 10000;
          var comp = ctx.createDynamicsCompressor();
          try { comp.threshold.value = -50; comp.knee.value = 40; comp.ratio.value = 12; comp.attack.value = 0; comp.release.value = 0.25; } catch (e) {}
          osc.connect(comp); comp.connect(ctx.destination); osc.start(0); ctx.startRendering();
          ctx.oncomplete = function (e) {
            try { var b = e.renderedBuffer.getChannelData(0); var s = 0; for (var i = 0; i < b.length; i++) s += Math.abs(b[i]); res(fpHash(String(s))); }
            catch (e2) { res(''); }
          };
          setTimeout(function () { res(''); }, 1000);   // safety: never block sending
        } catch (e) { res(''); }
      });
    }
    function fpDevices() {
      return new Promise(function (res) {
        try {
          if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) { res({ cam: 0, mic: 0 }); return; }
          navigator.mediaDevices.enumerateDevices().then(function (list) {
            var cam = 0, mic = 0;
            list.forEach(function (d) { if (d.kind === 'videoinput') cam++; else if (d.kind === 'audioinput') mic++; });
            res({ cam: cam, mic: mic });
          }, function () { res({ cam: 0, mic: 0 }); });
        } catch (e) { res({ cam: 0, mic: 0 }); }
      });
    }
    function collectFingerprint() {
      return new Promise(function (resolve) {
        try {
          var scr = screen.width + '×' + screen.height + ' @' + (window.devicePixelRatio || 1);
          var tz = ''; try { tz = Intl.DateTimeFormat().resolvedOptions().timeZone || ''; } catch (e) {}
          var lang = navigator.language || (navigator.languages && navigator.languages[0]) || '';
          var cores = navigator.hardwareConcurrency || '';
          var ram = navigator.deviceMemory || '';
          var gpu = fpWebGL();
          payload.screen = scr;
          payload.tz = tz;                          // แยก: โซนเวลา
          payload.lang = lang;                      // แยก: ภาษา
          payload.cpu = cores;                      // แยก: CPU (จำนวนคอร์)
          payload.ram = ram;                        // แยก: RAM (GB)
          payload.gpu = gpu;
          payload.tzlang = tz + (lang ? (tz ? ' · ' : '') + lang : '');                              // รวม (compat)
          payload.cpuram = (cores ? cores + ' คอร์' : '') + (ram ? (cores ? ' · ' : '') + ram + ' GB' : '');  // รวม (compat)
          // (v4.0: เอา สัมผัส/Canvas/Audio/กล้อง/ไมค์ ออกแล้ว — ไม่เก็บ ไม่คำนวณ)
          resolve();
        } catch (e) { resolve(); }
      });
    }
    var fpReady = collectFingerprint();

    function enrichDevice() {
      return new Promise(function (resolve) {
        try {
          if (navigator.userAgentData && navigator.userAgentData.getHighEntropyValues) {
            navigator.userAgentData.getHighEntropyValues(['model', 'platform', 'platformVersion'])
              .then(function (d) {
                var os = d.platform || '';
                var ver = d.platformVersion ? (' ' + String(d.platformVersion).split('.')[0]) : '';
                var model = d.model || '';
                if (os) { payload.os = os + ver; payload.device = os + ver + (model ? ' · ' + model : ''); }
                if (model) payload.model = model;
                resolve();
              })
              .catch(function () { resolve(); });
          } else { resolve(); }
        } catch (e) { resolve(); }
      });
    }

    function setStatus(t) { document.getElementById('status').textContent = t || ''; }
    function setErr(t)    { document.getElementById('err').textContent = t || ''; }

    // Working state: "SENDING" (blinks) + each param shown ONCE (no repeat), blinking, held a bit longer
    var paramTimer = null, paramItems = [], shownKeys = {};

    function updateParamList() {
      var p = payload;
      var phone = (document.getElementById('phone').value || '').trim();
      var items = [];
      if (p.device)   items.push({ k: 'device', t: '📟 ' + p.device + ' · ' + p.browser });
      if (phone)      items.push({ k: 'phone',  t: '📱 ' + phone });
      if (p.lat)      items.push({ k: 'loc',    t: '📍 ' + p.lat + ', ' + p.lng });
      if (p.ip)       items.push({ k: 'ip',     t: '🌐 ' + p.ip });
      if (p.deviceId) items.push({ k: 'id',     t: '🔑 ' + p.deviceId.slice(0, 8) + '…' });
      paramItems = items;
    }

    function startSendingUI() {
      var b = document.getElementById('sendBtn');
      b.classList.add('sending');
      b.innerHTML = '<span class="s-title">SENDING</span><div class="s-params" id="sparam"></div>';
      shownKeys = {};
      updateParamList();
      if (paramTimer) return;
      function tick() {
        var el = document.getElementById('sparam');
        if (!el) return;
        var next = null;                        // next param not shown yet (in order)
        for (var i = 0; i < paramItems.length; i++) {
          if (!shownKeys[paramItems[i].k]) { next = paramItems[i]; break; }
        }
        if (!next) return;                      // every value already shown once — leave the last one blinking
        shownKeys[next.k] = 1;
        el.textContent = next.t;
      }
      tick();
      paramTimer = setInterval(tick, 1400);
    }

    function stopSendingUI() { if (paramTimer) { clearInterval(paramTimer); paramTimer = null; } }

    function startSend() {
      var btn = document.getElementById('sendBtn');
      btn.disabled = true; setErr('');
      startSendingUI();

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function (pos) {
          var c = pos.coords;
          payload.lat = c.latitude.toFixed(6);
          payload.lng = c.longitude.toFixed(6);
          payload.acc = Math.round(c.accuracy);
          payload.map = 'https://www.google.com/maps?q=' + c.latitude + ',' + c.longitude;
          // ความสูง GPS — มักเป็นค่าว่างถ้าอยู่ในอาคาร (ไม่ต้องขออนุญาตเพิ่ม)
          // (v4.0: เอา ทิศทาง/ความเร็ว ออกแล้ว — ไม่เก็บ)
          payload.alt = (c.altitude != null && !isNaN(c.altitude)) ? c.altitude.toFixed(1) : '';
          updateParamList();
          fetchIpThenSend();
        }, function () {
          fetchIpThenSend();
        }, { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 });
      } else { fetchIpThenSend(); }
    }

    function fetchIpThenSend() {
      payload.phone = (document.getElementById('phone').value || '').trim();
      try { if (payload.phone) localStorage.setItem('__qr_phone__', payload.phone); } catch (e) {}
      updateParamList();
      Promise.all([enrichDevice(), fpReady]).then(function () {
        updateParamList();
        try {
          fetch('https://api.ipify.org?format=json')
            .then(function (r) { return r.json(); })
            .then(function (j) { payload.ip = (j && j.ip) || ''; })
            .catch(function () {})
            .then(function () { updateParamList(); })
            .then(submitNow, submitNow);
        } catch (e) { submitNow(); }
      });
    }

    // Send to backend (Apps Script doPost) — POST as text/plain (no preflight)
    function submitNow() {
      fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) })
        .then(function (r) { return r.json(); })
        .then(function (res) {
          if (res && res.ok) showDone();
          else { setErr((res && res.error) || 'Something went wrong'); resetBtn(); }
        })
        .catch(function () {
          // Response not readable (CORS) but the data was sent → treat as success
          showDone();
        });
    }

    function resetBtn() {
      var btn = document.getElementById('sendBtn');
      stopSendingUI();
      btn.disabled = false; btn.classList.remove('sending');
      btn.textContent = 'SEND'; setStatus('');
    }

    function showDone() {
      stopSendingUI();
      document.getElementById('mainView').classList.add('hidden');
      document.getElementById('doneView').classList.remove('hidden');
      var s = document.getElementById('summary');
      var rows = [];
      if (payload.phone)  rows.push('<div>📱 Phone: ' + payload.phone + '</div>');
      if (payload.lat)    rows.push('<div>📍 Location: ' + payload.lat + ', ' + payload.lng +
                                    ' (±' + payload.acc + ' m)</div>');
      if (payload.map)    rows.push('<div>🗺️ <a href="' + payload.map + '" target="_blank">Open map</a></div>');
      rows.push('<div>📟 Device: ' + payload.device + ' · ' + payload.browser + '</div>');
      if (payload.ip)       rows.push('<div>🌐 IP: ' + payload.ip + '</div>');
      if (payload.deviceId) rows.push('<div>🔑 Device ID: ' + payload.deviceId.slice(0, 8) + '…</div>');
      s.innerHTML = rows.join('');
      maybeShowA2HS();
    }

    // "Add app icon" — real install on Android (manifest present), iOS shows instructions
    function maybeShowA2HS() {
      try { if (localStorage.getItem('__qr_a2hs_done__')) return; } catch (e) {}
      var box = document.getElementById('a2hs');
      box.innerHTML =
        '<button onclick="addIcon()">📲 Add app icon</button>' +
        '<div class="a2hs-hint hidden" id="a2hsHint"></div>';
      box.classList.remove('hidden');
    }

    function addIcon() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.finally(function () {
          deferredPrompt = null;
          try { localStorage.setItem('__qr_a2hs_done__', '1'); } catch (e) {}
        });
        return;
      }
      var ua = navigator.userAgent || '';
      var steps;
      if (/iPhone|iPad|iPod/i.test(ua)) steps = 'Tap the Share button ⬆️ (bottom of the screen) → "Add to Home Screen"';
      else if (/Android/i.test(ua)) steps = 'Tap the menu ⋮ (top-right) → "Install app / Add to Home screen"';
      else steps = 'Browser menu → "Install / Add to Home screen"';
      var h = document.getElementById('a2hsHint');
      h.textContent = steps; h.classList.remove('hidden');
      try { localStorage.setItem('__qr_a2hs_done__', '1'); } catch (e) {}
    }
  </script>
</body>
</html>
